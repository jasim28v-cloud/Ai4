<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>طبّاخ برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --border: #eeece8;
            --gold: #c9a84c;
            --gold-light: #faf5e8;
            --gold-dark: #8b7300;
            --red: #e74c3c;
            --red-light: #fef5f5;
            --green: #27ae60;
            --text: #1a1a1a;
            --text2: #555;
            --text3: #999;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-lg: 0 8px 25px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
            --radius-xl: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #f5f3ee 0%, #f0ede6 100%);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            direction: rtl;
        }

        .app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            overflow: hidden;
            border-radius: 4px;
        }

        /* ==================== HEADER ==================== */
        .header {
            padding: 14px 18px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; }

        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--red), #c0392b);
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(231,76,60,0.25);
            position: relative;
        }

        .logo-dot {
            position: absolute; top: -3px; right: -3px;
            width: 8px; height: 8px; background: #f39c12;
            border-radius: 50%; animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.8); opacity: 1; }
        }

        .brand-text h1 { font-size: 18px; font-weight: 800; color: #1a1a1a; line-height: 1; }
        .brand-text span { font-size: 8px; color: #999; font-weight: 600; letter-spacing: 0.5px; }

        .header-actions { display: flex; gap: 8px; }

        .btn-icon {
            width: 40px; height: 40px;
            background: #f8f7f4; border: 1px solid var(--border);
            color: #888; cursor: pointer; border-radius: 12px;
            font-size: 15px; display: flex; align-items: center; justify-content: center;
            transition: all 0.25s; position: relative;
        }

        .btn-icon:hover { background: #f0ede8; color: #555; }
        .btn-icon.active { background: var(--red-light); border-color: var(--red); color: var(--red); }

        .badge {
            position: absolute; top: -6px; right: -6px;
            width: 20px; height: 20px; background: var(--red); color: #fff;
            font-size: 9px; font-weight: 700; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(231,76,60,0.3);
            display: none;
        }
        .badge.show { display: flex; }

        /* ==================== STATS ==================== */
        .stats-row {
            display: flex; gap: 8px; padding: 10px 16px;
            background: #fff; border-bottom: 1px solid var(--border);
        }

        .stat-box { flex: 1; padding: 10px 8px; border-radius: var(--radius-sm); text-align: center; }
        .stat-box:nth-child(1) { background: #fdfaf3; border: 1px solid #f5eed8; }
        .stat-box:nth-child(2) { background: #fef5f5; border: 1px solid #fce4e4; }
        .stat-box:nth-child(3) { background: #f5fdf8; border: 1px solid #d5f5e3; }

        .stat-num { font-size: 16px; font-weight: 800; display: block; }
        .stat-box:nth-child(1) .stat-num { color: #b8860b; }
        .stat-box:nth-child(2) .stat-num { color: #e74c3c; }
        .stat-box:nth-child(3) .stat-num { color: #27ae60; }
        .stat-lbl { font-size: 7px; color: #999; margin-top: 2px; letter-spacing: 0.5px; }

        /* ==================== SEARCH ==================== */
        .search-bar {
            padding: 10px 16px; background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 8px;
        }

        .search-input {
            flex: 1; padding: 11px 16px;
            background: #f8f7f4; border: 1.5px solid var(--border);
            color: var(--text); font-size: 11px; border-radius: 14px;
            font-family: 'Cairo', sans-serif; outline: none; transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--gold); background: #fff;
            box-shadow: 0 0 0 4px rgba(201,168,76,0.06);
        }
        .search-input::placeholder { color: #ccc; }

        .search-btn {
            padding: 11px 18px; background: var(--gold); color: #fff;
            border: none; cursor: pointer; border-radius: 14px;
            font-size: 11px; font-family: 'Cairo', sans-serif; font-weight: 700;
            white-space: nowrap; transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(201,168,76,0.2);
        }
        .search-btn:hover { background: var(--gold-dark); }

        /* ==================== CATEGORIES ==================== */
        .cat-scroll {
            display: flex; gap: 6px; padding: 0 16px 12px;
            background: #fff; overflow-x: auto; border-bottom: 1px solid var(--border);
        }
        .cat-scroll::-webkit-scrollbar { height: 0; }

        .cat-chip {
            padding: 8px 14px; background: #f8f6f2;
            border: 1.5px solid var(--border); color: #888;
            cursor: pointer; border-radius: 22px;
            font-size: 9px; font-weight: 700; white-space: nowrap;
            transition: all 0.3s; font-family: 'Cairo', sans-serif;
        }

        .cat-chip:hover { background: #f0ede8; }
        .cat-chip.active {
            background: #fff; border-color: var(--gold); color: var(--gold-dark);
            font-weight: 800; box-shadow: 0 2px 8px rgba(201,168,76,0.12);
        }

        /* ==================== CONTENT ==================== */
        .content {
            flex: 1; overflow-y: auto; padding: 12px 14px;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            align-content: start;
        }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-thumb { background: #e0ddd8; border-radius: 4px; }

        /* ==================== CARD ==================== */
        .card {
            background: #fff; border: 1px solid var(--border);
            border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm); animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .card:active { transform: scale(0.97); }

        .card-img {
            width: 100%; height: 145px;
            background: linear-gradient(135deg, #faf7f0, #f2ece0);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        .card-img img {
            width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;
            transition: transform 0.5s;
        }

        .card:hover .card-img img { transform: scale(1.05); }

        .card-img .emoji-placeholder {
            font-size: 48px; position: absolute;
        }

        .card-badge-time {
            position: absolute; top: 10px; right: 10px;
            padding: 5px 10px; background: rgba(255,255,255,0.95);
            color: #555; font-size: 8px; font-weight: 700;
            border-radius: 20px; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 4px; z-index: 2;
        }

        .card-btn-fav {
            position: absolute; top: 10px; left: 10px;
            width: 30px; height: 30px; background: rgba(255,255,255,0.95);
            border: none; color: #ccc; cursor: pointer; border-radius: 50%;
            font-size: 13px; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; box-shadow: var(--shadow-sm); z-index: 2;
        }

        .card-btn-fav:hover { transform: scale(1.1); }
        .card-btn-fav.liked { color: var(--red); }

        .card-body { padding: 12px 14px 14px; }

        .card-tag {
            display: inline-block; padding: 3px 8px;
            background: var(--gold-light); color: var(--gold-dark);
            font-size: 7px; font-weight: 700; border-radius: 6px;
            letter-spacing: 0.5px; margin-bottom: 6px;
        }

        .card-title {
            font-size: 13px; font-weight: 700; color: #1a1a1a;
            line-height: 1.35; margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-footer { display: flex; align-items: center; justify-content: space-between; }
        .card-area { font-size: 9px; color: #999; font-weight: 600; }
        .card-rate { color: #f0a500; font-size: 9px; }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            align-items: flex-end; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: #fff; border-radius: 28px 28px 0 0;
            width: 100%; max-width: 480px; max-height: 88vh;
            overflow-y: auto; animation: slideUp 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.25);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal::-webkit-scrollbar { width: 3px; }
        .modal::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .modal-handle {
            width: 40px; height: 5px; background: #e0ddd8;
            border-radius: 3px; margin: 12px auto 0;
        }

        .modal-hero {
            width: 100%; height: 230px;
            background: linear-gradient(135deg, #faf7f0, #f2ece0);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; margin-top: 8px;
        }

        .modal-hero img {
            width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;
        }

        .modal-hero .emoji-placeholder { font-size: 65px; position: absolute; }

        .modal-close-btn {
            position: absolute; top: 14px; right: 14px;
            width: 38px; height: 38px; background: rgba(255,255,255,0.95);
            border: none; color: #333; cursor: pointer; border-radius: 50%;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
            z-index: 5; box-shadow: var(--shadow); transition: all 0.3s;
        }

        .modal-close-btn:hover { background: #fff; transform: scale(1.05); }

        .modal-content { padding: 22px 18px 32px; }

        .modal-meta-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }

        .modal-tag {
            display: inline-block; padding: 5px 12px;
            background: var(--gold-light); color: var(--gold-dark);
            font-size: 9px; font-weight: 700; border-radius: 20px;
        }

        .modal-title {
            font-size: 22px; font-weight: 800; color: #1a1a1a;
            margin-bottom: 12px; line-height: 1.3;
        }

        .modal-info-pills { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }

        .info-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 8px 14px; background: #faf8f4; border-radius: 25px;
            font-size: 10px; font-weight: 600; color: #666; border: 1px solid #f0ede8;
        }

        .info-pill .pill-icon { font-size: 15px; }

        .modal-section { margin-bottom: 22px; }

        .section-heading {
            font-size: 13px; font-weight: 700; color: #1a1a1a;
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }

        .section-heading::after { content: ''; flex: 1; height: 1px; background: #f0ede8; }

        .ingredients-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }

        .ingredient-row {
            display: flex; align-items: center; gap: 10px;
            font-size: 11px; color: #444; padding: 10px 14px;
            background: #fafaf8; border-radius: 10px; border: 1px solid #f5f2ec;
            transition: all 0.2s;
        }

        .ingredient-row:hover { background: #fdfaf3; border-color: #f0e8d0; }
        .ingredient-bullet { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }

        .instructions-text { font-size: 11px; color: #444; line-height: 1.9; white-space: pre-line; }

        .btn-row { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

        .btn-favorite {
            width: 100%; padding: 13px;
            background: #fafaf8; border: 1.5px solid #f0ede8;
            color: #666; cursor: pointer; border-radius: 14px;
            font-size: 12px; font-weight: 700; transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-favorite:hover { background: #fdf5f5; border-color: var(--red); color: var(--red); }
        .btn-favorite.liked { background: var(--red); color: #fff; border-color: var(--red); }

        .btn-youtube-link {
            width: 100%; padding: 13px; background: #ff0000; color: #fff;
            border: none; cursor: pointer; border-radius: 14px;
            font-size: 12px; font-weight: 700; font-family: 'Cairo', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; transition: all 0.3s;
        }

        .btn-youtube-link:hover { background: #cc0000; }

        /* ==================== STATES ==================== */
        .loading-state {
            grid-column: 1 / -1; text-align: center; padding: 50px 20px; color: #bbb;
        }

        .loading-ring {
            width: 42px; height: 42px; border: 3px solid #f0ede8;
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 600; }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 50px 20px; }

        .empty-icon { font-size: 50px; display: block; margin-bottom: 10px; opacity: 0.4; }
        .empty-title { font-size: 13px; font-weight: 700; color: #999; margin-bottom: 4px; }
        .empty-sub { font-size: 10px; color: #bbb; }

        /* ==================== TOAST ==================== */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1a1a1a; color: #fff; padding: 12px 24px;
            border-radius: 30px; font-size: 10px; font-weight: 600;
            z-index: 300; transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Cairo', sans-serif; white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .refresh-bar {
            text-align: center; padding: 8px; background: #fdfaf3;
            color: var(--gold-dark); font-size: 9px; font-weight: 700;
            cursor: pointer; border-bottom: 1px solid var(--border);
            font-family: 'Cairo', sans-serif; transition: all 0.3s;
        }
        .refresh-bar:hover { background: #faf5e6; }
        .refresh-bar:active { background: #f5ecd0; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="brand">
                <div class="logo-icon">
                    🍳
                    <span class="logo-dot"></span>
                </div>
                <div class="brand-text">
                    <h1>طبّاخ برو</h1>
                    <span>وصفات عربية وعالمية</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="favFilterBtn" onclick="toggleFavFilter()">
                    ❤️
                    <span class="badge" id="favBadge">0</span>
                </button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box"><span class="stat-num" id="statTotal">-</span><span class="stat-lbl">وصفة</span></div>
            <div class="stat-box"><span class="stat-num" id="statFavs">0</span><span class="stat-lbl">مفضلة</span></div>
            <div class="stat-box"><span class="stat-num">🌐</span><span class="stat-lbl">مباشر</span></div>
        </div>

        <div class="refresh-bar" onclick="fetchRecipes()">🔄 اسحب للتحديث وجلب وصفات جديدة</div>

        <div class="search-bar">
            <input type="text" class="search-input" placeholder="ابحث عن وصفة..." id="searchInput" onkeypress="if(event.key==='Enter')searchRecipes()">
            <button class="search-btn" onclick="searchRecipes()">🔍 بحث</button>
        </div>

        <div class="cat-scroll" id="catFilter">
            <button class="cat-chip active" data-cat="all" onclick="filterCat('all', this)">🍽️ الكل</button>
            <button class="cat-chip" data-cat="main" onclick="filterCat('main', this)">🍖 رئيسية</button>
            <button class="cat-chip" data-cat="rice" onclick="filterCat('rice', this)">🍚 أرز</button>
            <button class="cat-chip" data-cat="appetizer" onclick="filterCat('appetizer', this)">🥗 مقبلات</button>
            <button class="cat-chip" data-cat="sweet" onclick="filterCat('sweet', this)">🍯 حلويات</button>
            <button class="cat-chip" data-cat="drink" onclick="filterCat('drink', this)">☕ مشروبات</button>
        </div>

        <div class="content" id="contentArea">
            <div class="loading-state"><div class="loading-ring"></div><div class="loading-text">جاري تحميل الوصفات...</div></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modal"></div></div>
    <div class="toast" id="toast"></div>

    <script>
        let allRecipes = [];
        let favorites = JSON.parse(localStorage.getItem('tbakh_pro_favs') || '[]');
        let showFavs = false;
        let currentCat = 'all';

        const arabicRecipes = [
            { id:'ar1', title:'كبسة الدجاج السعودية', cat:'rice', area:'سعودي', time:'90 د', img:'🍗', ings:['دجاجة كاملة','3 أكواب أرز بسمتي','2 بصل','4 طماطم','بهارات كبسة','زبيب ولوز'], steps:'حمّر الدجاج حتى يصبح ذهبياً.\nأضف البصل وقلّب حتى يذبل.\nأضف الطماطم والبهارات واطبخ 10 دقائق.\nأضف 4 أكواب ماء واتركه يغلي.\nأضف الأرز واتركه على نار هادئة 30 دقيقة.\nزيّن بالزبيب واللوز المحمص.' },
            { id:'ar2', title:'مندي اللحم', cat:'rice', area:'يمني', time:'180 د', img:'🥩', ings:['2 كيلو لحم غنم','3 أكواب أرز','بهارات مندي','فحم','زعفران','مكسرات'], steps:'تبّل اللحم واتركه ساعتين.\nاطبخ اللحم في قدر الضغط 45 دقيقة.\nاسلق الأرز في مرق اللحم.\nضع الفحم المشتعل للتدخين 10 دقائق.\nقدّم مع المكسرات.' },
            { id:'ar3', title:'شاورما الدجاج', cat:'main', area:'عربي', time:'40 د', img:'🌯', ings:['صدر دجاج','بهارات شاورما','ثومية','مخلل','بطاطس','خبز صاج'], steps:'قطّع الدجاج شرائح.\nتبّل واتركه 30 دقيقة.\nاقلي على نار عالية.\nادهن الخبز بالثومية.\nأضف الحشوة ولفّ.' },
            { id:'ar4', title:'مقلوبة فلسطينية', cat:'rice', area:'فلسطيني', time:'90 د', img:'🍲', ings:['دجاج','أرز','باذنجان','قرنبيط','بطاطا','بهارات'], steps:'اسلق الدجاج.\nاقلي الخضار.\nرصّ في القدر.\nاسكب المرق واطبخ 30 دقيقة.\nاقلب القدر وقدم.' },
            { id:'ar5', title:'منسف أردني', cat:'main', area:'أردني', time:'120 د', img:'🍖', ings:['لحم غنم','جميد','أرز','خبز شراك','صنوبر'], steps:'انقع الجميد.\nاطبخ اللحم.\nضع الخبز ثم الأرز واللحم.\nاسكب الجميد وزين.' },
            { id:'ar6', title:'حمص بيروتي', cat:'appetizer', area:'لبناني', time:'15 د', img:'🫒', ings:['حمص','طحينة','ليمون','ثوم','زيت زيتون','كمون'], steps:'اسلق الحمص.\nاهرسه مع الطحينة والليمون.\nزين بزيت الزيتون ورش الكمون.' },
            { id:'ar7', title:'متبل باذنجان', cat:'appetizer', area:'شامي', time:'25 د', img:'🍆', ings:['باذنجان','طحينة','ليمون','ثوم','زيت زيتون'], steps:'اشوِ الباذنجان.\nقشّره واهرسه.\nأضف الطحينة والليمون.\nزيّن بزيت الزيتون.' },
            { id:'ar8', title:'كنافة نابلسية', cat:'sweet', area:'فلسطيني', time:'60 د', img:'🧀', ings:['عجينة كنافة','جبن عكاوي','سمن','قطر','فستق'], steps:'فتّت العجينة واخلطها بالسمن.\nضع نصفها ثم الجبن.\nأضف الباقي واخبز.\nاسكب القطر وزين.' },
            { id:'ar9', title:'بقلاوة تركية', cat:'sweet', area:'تركي', time:'60 د', img:'🥮', ings:['جلاش','جوز','سمن','قطر','فستق'], steps:'ضع طبقات الجلاش مع الجوز.\nاخبز 45 دقيقة.\nاسكب القطر البارد.' },
            { id:'ar10', title:'أم علي', cat:'sweet', area:'مصري', time:'35 د', img:'🥣', ings:['بف باستري','حليب','قشطة','مكسرات','زبيب'], steps:'اخبز البف باستري وفتته.\nأضف الحليب والمكسرات.\nاخبز 20 دقيقة وقدم.' },
            { id:'ar11', title:'كباب عراقي', cat:'main', area:'عراقي', time:'30 د', img:'🥙', ings:['لحم مفروم','بصل','بقدونس','بهارات'], steps:'اخلط اللحم مع البصل.\nشكّل على أسياخ.\nاشوِ وقدم.' },
            { id:'ar12', title:'شكشوكة مغربية', cat:'main', area:'مغربي', time:'20 د', img:'🍳', ings:['بيض','طماطم','بصل','فلفل','كمون'], steps:'اقلي البصل والفلفل.\nأضف الطماطم.\nاكسر البيض وغطّ.' },
            { id:'ar13', title:'قهوة عربية', cat:'drink', area:'عربي', time:'20 د', img:'🫖', ings:['بن عربي','هيل','زعفران','ماء','تمر'], steps:'اغلِ الماء.\nأضف البن.\nأضف الهيل.\nاتركه يهدأ واسكب.' },
            { id:'ar14', title:'شاي عدني', cat:'drink', area:'يمني', time:'15 د', img:'☕', ings:['شاي أحمر','حليب مكثف','هيل','زنجبيل'], steps:'اغلِ الماء مع البهارات.\nأضف الشاي.\nصفّ وأضف الحليب.' },
            { id:'ar15', title:'معصوب يمني', cat:'sweet', area:'يمني', time:'20 د', img:'🍌', ings:['خبز بر','موز','قشطة','عسل','تمر'], steps:'فتّت الخبز.\nاهرس الموز.\nأضف القشطة.\nاسكب العسل.' }
        ];

        async function fetchRecipes(query) {
            document.getElementById('contentArea').innerHTML = '<div class="loading-state"><div class="loading-ring"></div><div class="loading-text">جاري التحميل...</div></div>';
            let fetched = [];
            try {
                const q = query || 'chicken';
                const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`);
                const data = await res.json();
                if (data.meals) {
                    fetched = data.meals.map(m => ({
                        id: m.idMeal, title: m.strMeal, cat: m.strCategory || 'عام',
                        area: m.strArea || 'عالمي', time: '30-45 د',
                        img: m.strMealThumb ? m.strMealThumb + '/preview' : '🍽️',
                        yt: m.strYoutube || '', ings: getIngs(m), steps: m.strInstructions || ''
                    }));
                }
                allRecipes = [...arabicRecipes, ...fetched];
                render(); updateStats();
            } catch(e) { allRecipes = arabicRecipes; render(); updateStats(); }
        }

        function getIngs(m) {
            const ings = [];
            for (let i = 1; i <= 20; i++) {
                const ing = m['strIngredient' + i], meas = m['strMeasure' + i];
                if (ing && ing.trim()) ings.push(meas ? `${meas.trim()} ${ing.trim()}` : ing.trim());
            }
            return ings.length ? ings : ['مكونات متنوعة'];
        }

        async function searchRecipes() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return showToast('⚠️ اكتب اسم الوصفة');
            await fetchRecipes(q);
        }

        function render() {
            const area = document.getElementById('contentArea');
            const search = document.getElementById('searchInput').value.trim();
            let list = allRecipes;
            if (currentCat !== 'all') list = list.filter(r => r.cat === currentCat);
            if (showFavs) list = list.filter(r => favorites.includes(r.id));
            if (search) list = list.filter(r => r.title.includes(search) || r.ings?.some(i => i.includes(search)));

            updateStats();
            if (!list.length) {
                area.innerHTML = '<div class="empty-state"><span class="empty-icon">🍽️</span><div class="empty-title">لا توجد وصفات</div><div class="empty-sub">جرب البحث عن شيء آخر</div></div>';
                return;
            }

            area.innerHTML = list.map(r => {
                const isFav = favorites.includes(r.id);
                const catNames = { main:'رئيسي', rice:'أرز', appetizer:'مقبلات', sweet:'حلويات', drink:'مشروبات' };
                const catName = catNames[r.cat] || r.cat || 'عام';
                const isImage = r.img && r.img.startsWith('http');
                const imgTag = isImage
                    ? `<img src="${r.img}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="emoji-placeholder" style="display:none">🍽️</span>`
                    : `<span class="emoji-placeholder">${r.img||'🍽️'}</span>`;
                return `<div class="card" onclick="openModal('${r.id}')"><div class="card-img">${imgTag}<span class="card-badge-time">⏱ ${r.time}</span><button class="card-btn-fav ${isFav?'liked':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">${isFav?'❤️':'🤍'}</button></div><div class="card-body"><span class="card-tag">${catName}</span><div class="card-title">${r.title}</div><div class="card-footer"><span class="card-area">🌍 ${r.area||'عالمي'}</span><span class="card-rate">⭐</span></div></div></div>`;
            }).join('');
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allRecipes.length;
            document.getElementById('statFavs').textContent = favorites.length;
            const b = document.getElementById('favBadge');
            b.textContent = favorites.length;
            b.classList.toggle('show', favorites.length > 0);
        }

        function filterCat(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function toggleFavFilter() {
            showFavs = !showFavs;
            document.getElementById('favFilterBtn').classList.toggle('active', showFavs);
            render();
            showToast(showFavs ? '❤️ المفضلة' : '🌍 الكل');
        }

        function toggleFav(id) {
            favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
            localStorage.setItem('tbakh_pro_favs', JSON.stringify(favorites));
            updateStats(); render();
        }

        function openModal(id) {
            const r = allRecipes.find(x => x.id.toString() === id.toString());
            if (!r) return;
            const isFav = favorites.includes(r.id);
            const catNames = { main:'رئيسي', rice:'أرز', appetizer:'مقبلات', sweet:'حلويات', drink:'مشروبات' };
            const catName = catNames[r.cat] || r.cat || 'عام';
            const isImage = r.img && r.img.startsWith('http');
            const imgTag = isImage
                ? `<img src="${r.img}" alt="${r.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="emoji-placeholder" style="display:none">🍽️</span>`
                : `<span class="emoji-placeholder">${r.img||'🍽️'}</span>`;

            document.getElementById('modal').innerHTML = `
                <div class="modal-handle"></div>
                <div class="modal-hero">${imgTag}<button class="modal-close-btn" onclick="closeModal()">✕</button></div>
                <div class="modal-content">
                    <div class="modal-meta-row"><span class="modal-tag">${catName}</span><span style="font-size:9px;color:#999">${r.area||'عالمي'}</span></div>
                    <div class="modal-title">${r.title}</div>
                    <div class="modal-info-pills"><div class="info-pill"><span class="pill-icon">⏱</span>${r.time}</div><div class="info-pill"><span class="pill-icon">🌍</span>${r.area||'عالمي'}</div><div class="info-pill"><span class="pill-icon">📋</span>${(r.ings||[]).length} مكونات</div></div>
                    <div class="modal-section"><div class="section-heading">🛒 المقادير</div><ul class="ingredients-list">${(r.ings||['مكونات متنوعة']).map(i => `<li class="ingredient-row"><span class="ingredient-bullet"></span>${i}</li>`).join('')}</ul></div>
                    <div class="modal-section"><div class="section-heading">👨‍🍳 طريقة التحضير</div><div class="instructions-text">${r.steps||'暂无说明'}</div></div>
                    <div class="btn-row">
                        ${r.yt ? `<a href="${r.yt}" target="_blank" class="btn-youtube-link">▶️ شاهد الفيديو على يوتيوب</a>` : ''}
                        <button class="btn-favorite ${isFav?'liked':''}" onclick="toggleFav('${r.id}');closeModal();showToast('${isFav?'💔 تمت الإزالة':'❤️ تمت الإضافة'}')">${isFav?'❤️ إزالة من المفضلة':'🤍 أضف إلى المفضلة'}</button>
                    </div>
                </div>`;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }

        updateStats(); fetchRecipes();
    </script>
</body>
</html>
