<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter X | God Mode</title>
    <style>
        :root {
            --bg: #000;
            --gold: #c9a84c;
            --neon-blue: #00aaff;
            --neon-red: #ff3344;
            --text: #e0d5c0;
            --text-dim: #6b6355;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .game-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 4px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2px;
        }

        .title {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(180deg, var(--neon-blue), #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(0,170,255,0.6));
        }

        .world-name {
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.5s;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 3px;
            background: rgba(8,8,8,0.85);
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 6px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
        .hud-val { font-size: 13px; font-weight: 900; }

        .divider-v {
            width: 1px; height: 18px;
            background: linear-gradient(180deg, transparent, #1a1a1a, transparent);
        }

        .bars-container {
            padding: 2px 10px; margin-bottom: 3px;
            display: flex; gap: 5px;
        }
        .bar-group { flex: 1; }
        .bar-label { font-size: 5px; color: #555; letter-spacing: 2px; margin-bottom: 1px; }
        .bar-bg { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
        .bar-fill.health { background: linear-gradient(90deg, #ff3344, #ff8800, #00ff88); }
        .bar-fill.shield { background: linear-gradient(90deg, #0088ff, #00aaff); }
        .bar-fill.timer { background: linear-gradient(90deg, #ffaa00, #ffcc00); }

        .canvas-container {
            position: relative;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,100,255,0.08), 0 20px 40px rgba(0,0,0,0.8);
            background: #000;
        }

        canvas { display: block; width: 100%; height: auto; }

        .joystick-container {
            position: absolute;
            bottom: 15px; left: 15px;
            width: 90px; height: 90px;
            z-index: 20;
        }
        .joystick-base {
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            position: relative;
        }
        .joystick-thumb {
            width: 40px; height: 40px;
            background: rgba(0,170,255,0.25);
            border: 2px solid rgba(0,170,255,0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(0,170,255,0.3);
        }

        .fire-btn {
            position: absolute;
            bottom: 25px; right: 18px;
            width: 65px; height: 65px;
            background: rgba(255,51,68,0.15);
            border: 2px solid rgba(255,51,68,0.4);
            border-radius: 50%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #ff3344;
            box-shadow: 0 0 25px rgba(255,51,68,0.2);
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .fire-btn:active {
            background: rgba(255,51,68,0.3);
            box-shadow: 0 0 45px rgba(255,51,68,0.5);
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            z-index: 10;
            transition: all 0.5s;
            backdrop-filter: blur(5px);
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        .overlay-icon { font-size: 40px; animation: float 2s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .overlay-title {
            font-size: 16px; font-weight: 900;
            letter-spacing: 3px; margin: 5px 0;
        }
        .overlay-score {
            font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, #ff3344, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 3px 0;
        }
        .overlay-sub { font-size: 9px; color: #666; letter-spacing: 2px; margin-bottom: 8px; }

        .btn-play {
            padding: 10px 30px;
            background: linear-gradient(135deg, #00aaff, #0088ff);
            background-size: 200% 200%;
            color: #000;
            border: none;
            font-weight: 900;
            cursor: pointer;
            border-radius: 22px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(0,170,255,0.3);
            animation: gradientShift 3s ease-in-out infinite;
            font-family: inherit;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .btn-play:active { transform: scale(0.93); }

        .footer {
            text-align: center; margin-top: 3px;
            font-size: 6px; color: #0a0a0a; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <h1 class="title">SPACE SHOOTER X</h1>
            <p class="world-name" id="worldName" style="color:#00aaff">✦ DEEP SPACE ✦</p>
        </div>

        <div class="hud">
            <div class="hud-item"><span class="hud-label">Score</span><span class="hud-val" id="score" style="color:#00aaff">0</span></div>
            <div class="divider-v"></div>
            <div class="hud-item"><span class="hud-label">Wave</span><span class="hud-val" id="wave" style="color:#c9a84c">1</span></div>
            <div class="divider-v"></div>
            <div class="hud-item"><span class="hud-label">Kills</span><span class="hud-val" id="kills" style="color:#ff8800">0</span></div>
            <div class="divider-v"></div>
            <div class="hud-item"><span class="hud-label">Lives</span><span class="hud-val" id="lives" style="color:#ff3344">3</span></div>
        </div>

        <div class="bars-container">
            <div class="bar-group"><span class="bar-label">HP</span><div class="bar-bg"><div class="bar-fill health" id="healthBar" style="width:100%"></div></div></div>
            <div class="bar-group"><span class="bar-label">SHIELD</span><div class="bar-bg"><div class="bar-fill shield" id="shieldBar" style="width:100%"></div></div></div>
            <div class="bar-group"><span class="bar-label">WAVE TIME</span><div class="bar-bg"><div class="bar-fill timer" id="timerBar" style="width:100%"></div></div></div>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
            
            <div class="joystick-container" id="joystick">
                <div class="joystick-base"><div class="joystick-thumb" id="joystickThumb"></div></div>
            </div>
            <div class="fire-btn" id="fireBtn">💥</div>

            <div class="overlay" id="startOverlay">
                <div class="overlay-icon">🚀</div>
                <div class="overlay-title" style="color:#00aaff">SPACE SHOOTER X</div>
                <div class="overlay-sub">GOD MODE EDITION</div>
                <button class="btn-play" onclick="startGame()">✦ LAUNCH ✦</button>
            </div>

            <div class="overlay hidden" id="waveOverlay">
                <div class="overlay-icon">🎉</div>
                <div class="overlay-title" style="color:#00ff88">WAVE CLEAR!</div>
                <div class="overlay-score" id="waveScore">0</div>
                <div class="overlay-sub" id="nextWorld">Entering: DEEP SPACE</div>
                <button class="btn-play" onclick="nextWave()">✦ NEXT ✦</button>
            </div>

            <div class="overlay hidden" id="gameOverOverlay">
                <div class="overlay-icon">💀</div>
                <div class="overlay-title" style="color:#ff3344">DESTROYED</div>
                <div class="overlay-score" id="finalScore">0</div>
                <button class="btn-play" onclick="restartGame()">✦ RETRY ✦</button>
            </div>
        </div>

        <p class="footer">SPACE SHOOTER X • GOD MODE • 5 WORLDS</p>
    </div>

    <script>
        // ==================== CANVAS ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        let W, H;

        function resize() {
            W = container.clientWidth;
            H = Math.max(W * 1.3, 460);
            canvas.width = W;
            canvas.height = H;
        }
        resize();
        window.addEventListener('resize', resize);

        // ==================== AUDIO ====================
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function beep(f, d, t, v) {
            if (!audioCtx) return;
            try {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = t || 'square';
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v || 0.04, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        // ==================== WORLDS ====================
        const worlds = [
            {
                name: 'DEEP SPACE',
                color: '#00aaff',
                bg: '#000015',
                starColor: '#ffffff',
                nebulaColor: 'rgba(0,100,255,0.03)',
                enemyColors: ['#ff3344', '#ff5566', '#ff2244'],
                bossColor: '#cc2222',
                bulletColor: '#00aaff',
                duration: 35
            },
            {
                name: 'PURPLE NEBULA',
                color: '#aa44ff',
                bg: '#0a0015',
                starColor: '#ddaaff',
                nebulaColor: 'rgba(150,50,255,0.04)',
                enemyColors: ['#ff44aa', '#ff66cc', '#cc2288'],
                bossColor: '#aa22aa',
                bulletColor: '#cc66ff',
                duration: 38
            },
            {
                name: 'ASTEROID FIELD',
                color: '#ff8844',
                bg: '#150800',
                starColor: '#ffccaa',
                nebulaColor: 'rgba(255,120,50,0.03)',
                enemyColors: ['#ff6644', '#ff8855', '#cc4422'],
                bossColor: '#884422',
                bulletColor: '#ff8844',
                duration: 40,
                asteroids: true
            },
            {
                name: 'RED GALAXY',
                color: '#ff2244',
                bg: '#150000',
                starColor: '#ffaaaa',
                nebulaColor: 'rgba(255,30,30,0.04)',
                enemyColors: ['#ff1122', '#ff3344', '#cc0011'],
                bossColor: '#880000',
                bulletColor: '#ff4455',
                duration: 42
            },
            {
                name: 'BLACK HOLE',
                color: '#888888',
                bg: '#000008',
                starColor: '#cccccc',
                nebulaColor: 'rgba(100,100,100,0.05)',
                enemyColors: ['#666666', '#888888', '#444444'],
                bossColor: '#333333',
                bulletColor: '#aaaaaa',
                duration: 45,
                blackHole: true
            }
        ];

        // ==================== JOYSTICK ====================
        const joystickBase = document.getElementById('joystick');
        const joystickThumb = document.getElementById('joystickThumb');
        let joystickDX = 0, joystickDY = 0, joystickActive = false;

        joystickBase.addEventListener('touchstart', (e) => {
            e.preventDefault(); joystickActive = true; updateJoystick(e.touches[0]);
        });
        joystickBase.addEventListener('touchmove', (e) => {
            e.preventDefault(); if (joystickActive) updateJoystick(e.touches[0]);
        });
        joystickBase.addEventListener('touchend', () => {
            joystickActive = false; joystickDX = 0; joystickDY = 0;
            joystickThumb.style.transform = 'translate(-50%, -50%)';
        });

        function updateJoystick(touch) {
            const rect = joystickBase.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = touch.clientX - cx;
            const dy = touch.clientY - cy;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 32);
            const angle = Math.atan2(dy, dx);
            joystickDX = Math.cos(angle) * (dist / 32);
            joystickDY = Math.sin(angle) * (dist / 32);
            joystickThumb.style.transform = `translate(calc(-50% + ${joystickDX * 32}px), calc(-50% + ${joystickDY * 32}px))`;
        }

        const fireBtn = document.getElementById('fireBtn');
        let isFiring = false;
        fireBtn.addEventListener('pointerdown', () => { isFiring = true; if (gameState === 'idle') startGame(); });
        fireBtn.addEventListener('pointerup', () => { isFiring = false; });
        fireBtn.addEventListener('pointerleave', () => { isFiring = false; });

        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') { e.preventDefault(); isFiring = true; if (gameState === 'idle') startGame(); else if (gameState === 'wavedone') nextWave(); }
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; if (e.key === ' ') isFiring = false; });

        // ==================== STATE ====================
        let player, bullets, enemies, particles, powerUps, stars = [], asteroids = [];
        let score, wave, lives, health, shield, kills, worldIndex;
        let gameState = 'idle';
        let highScore = parseInt(localStorage.getItem('shooterxgod_high') || '0');
        let shakeTimer = 0, shakeIntensity = 0;
        let waveTimer = 0, waveDuration = 35;
        let engineGlow = 0;

        function getWorld() { return worlds[worldIndex % worlds.length]; }

        function generateStars() {
            stars = [];
            const w = getWorld();
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 2.5 + 0.3,
                    speed: Math.random() * 3 + 0.3,
                    brightness: Math.random(),
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function generateAsteroids() {
            asteroids = [];
            if (!getWorld().asteroids) return;
            for (let i = 0; i < 6; i++) {
                asteroids.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 25 + 10,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: Math.random() * 1.5 + 0.5,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.03
                });
            }
        }

        function initGame() {
            worldIndex = 0;
            player = { x: W/2, y: H*0.7, w: 40, h: 50, speed: 5.5, invincible: 0 };
            bullets = []; enemies = []; particles = []; powerUps = [];
            score = 0; wave = 1; lives = 3; kills = 0;
            health = 100; shield = 50;
            shakeTimer = 0; shakeIntensity = 0;
            waveDuration = getWorld().duration;
            waveTimer = waveDuration * 60;
            generateStars();
            generateAsteroids();
            spawnEnemies();
            updateHUD();
            updateWorldUI();
        }

        function spawnEnemies() {
            enemies = [];
            const w = getWorld();
            const count = 3 + wave * 2 + worldIndex * 2;
            
            for (let i = 0; i < count; i++) {
                const types = ['scout', 'fighter', 'bomber'];
                const type = types[Math.floor(Math.random() * Math.min(3, 1 + Math.floor((wave + worldIndex * 2) / 2)))];
                enemies.push(createEnemy(type));
            }

            if ((wave + worldIndex * 5) % 5 === 0) {
                const boss = createEnemy('boss');
                boss.x = W/2 - 50; boss.y = -100;
                boss.hp = 12 + (wave + worldIndex * 3) * 2;
                boss.maxHp = boss.hp;
                enemies.push(boss);
            }
        }

        function createEnemy(type) {
            const w = getWorld();
            const base = {
                x: Math.random() * (W - 50) + 25,
                y: -(Math.random() * H * 0.3 + 20),
                shootTimer: Math.random() * 70,
                dead: false, hit: false
            };

            switch(type) {
                case 'scout':
                    return { ...base, w: 26, h: 28, hp: 1, maxHp: 1, speed: 2.5 + worldIndex * 0.3, type: 'scout', color: w.enemyColors[0] };
                case 'fighter':
                    return { ...base, w: 34, h: 36, hp: 2, maxHp: 2, speed: 1.8 + worldIndex * 0.2, type: 'fighter', color: w.enemyColors[1], strafeDir: Math.random() < 0.5 ? -1 : 1 };
                case 'bomber':
                    return { ...base, w: 48, h: 38, hp: 3, maxHp: 3, speed: 1 + worldIndex * 0.15, type: 'bomber', color: w.enemyColors[2] };
                case 'boss':
                    return { ...base, w: 90, h: 70, hp: 15, maxHp: 15, speed: 0.5, type: 'boss', color: w.bossColor };
            }
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('score').style.color = getWorld().color;
            document.getElementById('wave').textContent = wave;
            document.getElementById('kills').textContent = kills;
            document.getElementById('lives').textContent = lives;
            document.getElementById('healthBar').style.width = (health / 100 * 100) + '%';
            document.getElementById('shieldBar').style.width = (shield / 50 * 100) + '%';
            document.getElementById('timerBar').style.width = (waveTimer / (waveDuration * 60) * 100) + '%';
        }

        function updateWorldUI() {
            const w = getWorld();
            document.getElementById('worldName').textContent = '✦ ' + w.name + ' ✦';
            document.getElementById('worldName').style.color = w.color;
        }

        // ==================== GAME LOOP ====================
        function update() {
            const w = getWorld();
            waveTimer--;
            
            if (waveTimer <= 0) {
                waveComplete();
                return;
            }

            // Stars
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
                s.twinkle += 0.015;
            });

            // Asteroids
            asteroids.forEach(a => {
                a.y += a.vy;
                a.x += a.vx;
                a.rotation += a.rotSpeed;
                if (a.y > H + 40) { a.y = -40; a.x = Math.random() * W; }
                if (a.x < -40) a.x = W + 40;
                if (a.x > W + 40) a.x = -40;
                
                // Asteroid-player collision
                if (player.invincible <= 0 && 
                    Math.abs(a.x - player.x) < a.size + player.w/2 &&
                    Math.abs(a.y - player.y) < a.size + player.h/2) {
                    health -= 15;
                    shield = Math.max(0, shield - 5);
                    player.invincible = 20;
                    shakeIntensity = 8; shakeTimer = 10;
                    if (health <= 0) die();
                }
            });

            // Player movement
            let mx = joystickDX, my = joystickDY;
            if (keys['ArrowLeft'] || keys['a']) mx = -1;
            if (keys['ArrowRight'] || keys['d']) mx = 1;
            if (keys['ArrowUp'] || keys['w']) my = -1;
            if (keys['ArrowDown'] || keys['s']) my = 1;

            player.x += mx * player.speed;
            player.y += my * player.speed;
            player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
            player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));
            if (player.invincible > 0) player.invincible--;

            engineGlow += 0.1;

            // Fire
            if (isFiring || Math.random() < 0.3) {
                bullets.push({ x: player.x, y: player.y - player.h/2, vx: 0, vy: -9, w: 3, h: 13, color: w.bulletColor, enemy: false });
                if (wave + worldIndex >= 3) {
                    bullets.push({ x: player.x - 10, y: player.y - player.h/2 + 3, vx: -1.3, vy: -8, w: 2.5, h: 9, color: w.bulletColor, enemy: false });
                    bullets.push({ x: player.x + 10, y: player.y - player.h/2 + 3, vx: 1.3, vy: -8, w: 2.5, h: 9, color: w.bulletColor, enemy: false });
                }
            }

            // Bullets
            bullets = bullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.y > -30 && b.y < H + 30 && b.x > -30 && b.x < W + 30; });

            // Enemies
            enemies.forEach(e => {
                e.y += e.speed;
                if (e.type === 'scout') e.x += Math.sin(e.y * 0.04) * 3;
                else if (e.type === 'fighter') e.x += Math.sin(e.y * 0.03) * e.strafeDir * 2;

                e.shootTimer++;
                const interval = e.type === 'boss' ? 25 : e.type === 'bomber' ? 55 : e.type === 'fighter' ? 50 : 75;
                
                if (e.shootTimer > interval && e.y > 10 && e.y < H * 0.7) {
                    e.shootTimer = 0;
                    if (e.type === 'boss') {
                        for (let a = -0.6; a <= 0.6; a += 0.25) {
                            bullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: Math.sin(a) * 3, vy: 3, w: 6, h: 6, color: '#ff4444', enemy: true });
                        }
                    } else {
                        const ang = Math.atan2(player.y - e.y, player.x - e.x);
                        bullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: Math.cos(ang) * 2.5, vy: Math.sin(ang) * 2.5 + 1, w: 4, h: 4, color: e.color, enemy: true });
                    }
                }
            });

            // Bullet-Enemy
            bullets.forEach(b => {
                if (b.enemy) return;
                enemies.forEach(e => {
                    if (b.x > e.x - e.w/2 && b.x < e.x + e.w/2 && b.y > e.y - e.h/2 && b.y < e.y + e.h/2) {
                        b.hit = true; e.hp--;
                        if (e.hp <= 0) {
                            e.dead = true; kills++;
                            score += e.type === 'boss' ? 1000 : e.type === 'bomber' ? 300 : e.type === 'fighter' ? 200 : 100;
                            beep(500, 0.07, 'square', 0.03);
                            addParticles(e.x, e.y, e.color, e.type === 'boss' ? 25 : 10);
                            if (e.type === 'boss') { shakeIntensity = 18; shakeTimer = 22; beep(150, 0.4, 'sawtooth', 0.05); }
                            if (Math.random() < 0.35) powerUps.push({ x: e.x, y: e.y, type: ['health','shield','score'][Math.floor(Math.random()*3)], vy: 1.5 });
                        }
                    }
                });
            });

            bullets = bullets.filter(b => !b.hit);
            enemies = enemies.filter(e => !e.dead && e.y < H + 120);

            // Enemy-Player
            enemies.forEach(e => {
                if (player.invincible > 0) return;
                if (Math.abs(e.x - player.x) < (e.w + player.w)/2 && Math.abs(e.y - player.y) < (e.h + player.h)/2) {
                    const dmg = e.type === 'boss' ? 35 : e.type === 'bomber' ? 20 : 12;
                    if (shield > 0) { const sd = Math.min(shield, dmg); shield -= sd; if (dmg > sd) health -= (dmg - sd); }
                    else health -= dmg;
                    player.invincible = 18;
                    shakeIntensity = 9; shakeTimer = 10;
                    beep(120, 0.15, 'sawtooth', 0.04);
                    if (health <= 0) die();
                }
            });

            // Enemy bullets
            bullets = bullets.filter(b => {
                if (!b.enemy || player.invincible > 0) return true;
                if (Math.abs(b.x - player.x) < player.w/2 && Math.abs(b.y - player.y) < player.h/2) {
                    if (shield > 0) shield = Math.max(0, shield - 7);
                    else health -= 7;
                    shakeIntensity = 4; shakeTimer = 5;
                    if (health <= 0) die();
                    return false;
                }
                return true;
            });

            // Power-ups
            powerUps = powerUps.filter(p => {
                p.y += p.vy;
                if (Math.abs(p.x - player.x) < player.w/2 && Math.abs(p.y - player.y) < player.h/2) {
                    if (p.type === 'health') health = Math.min(100, health + 30);
                    else if (p.type === 'shield') shield = Math.min(50, shield + 25);
                    else score += 200;
                    beep(650, 0.08, 'triangle', 0.03);
                    return false;
                }
                return p.y < H + 30;
            });

            // Particles
            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; return p.life > 0; });

            if (shield < 50 && Math.random() < 0.015) shield = Math.min(50, shield + 0.3);
            if (shakeTimer > 0) shakeTimer--;

            if (enemies.length === 0) waveComplete();

            updateHUD();
        }

        function die() {
            lives--; health = 100; shield = 25; player.invincible = 50;
            updateHUD();
            if (lives <= 0) {
                gameState = 'gameover';
                if (score > highScore) { highScore = score; localStorage.setItem('shooterxgod_high', highScore); }
                document.getElementById('finalScore').textContent = 'Score: ' + score;
                document.getElementById('gameOverOverlay').classList.remove('hidden');
            }
        }

        function waveComplete() {
            gameState = 'wavedone';
            if (score > highScore) { highScore = score; localStorage.setItem('shooterxgod_high', highScore); }
            document.getElementById('waveScore').textContent = 'Score: ' + score;
            
            worldIndex++;
            if (worldIndex >= worlds.length) worldIndex = 0;
            
            document.getElementById('nextWorld').textContent = 'Entering: ' + getWorld().name;
            document.getElementById('waveOverlay').classList.remove('hidden');
        }

        function nextWave() {
            wave++;
            const w = getWorld();
            waveDuration = w.duration;
            waveTimer = waveDuration * 60;
            health = Math.min(100, health + 15);
            shield = Math.min(50, shield + 10);
            document.getElementById('waveOverlay').classList.add('hidden');
            gameState = 'playing';
            updateWorldUI();
            generateStars();
            generateAsteroids();
            spawnEnemies();
            updateHUD();
            beep(500, 0.1); beep(700, 0.1); beep(900, 0.15);
        }

        function startGame() {
            initAudio();
            worldIndex = 0;
            initGame();
            gameState = 'playing';
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('waveOverlay').classList.add('hidden');
            updateWorldUI();
            updateHUD();
            beep(400, 0.12); beep(600, 0.12); beep(900, 0.18);
        }

        function restartGame() {
            gameState = 'idle';
            document.getElementById('startOverlay').classList.remove('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('waveOverlay').classList.add('hidden');
            initGame();
        }

        function addParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, color });
            }
        }

        // ==================== DRAWING ====================
        function draw() {
            const w = getWorld();
            const sx = shakeTimer > 0 ? (Math.random()-0.5)*shakeIntensity : 0;
            const sy = shakeTimer > 0 ? (Math.random()-0.5)*shakeIntensity : 0;

            ctx.fillStyle = w.bg;
            ctx.fillRect(0, 0, W, H);

            // Nebula
            ctx.fillStyle = w.nebulaColor;
            ctx.fillRect(0, 0, W, H);

            // Black hole
            if (w.blackHole) {
                const bhGrad = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, W*0.7);
                bhGrad.addColorStop(0, 'rgba(0,0,0,1)');
                bhGrad.addColorStop(0.3, 'rgba(20,0,40,0.6)');
                bhGrad.addColorStop(0.7, 'rgba(40,0,80,0.2)');
                bhGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = bhGrad;
                ctx.beginPath();
                ctx.arc(W/2, H/2, W*0.7, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.save();
            ctx.translate(sx, sy);

            // Stars
            stars.forEach(s => {
                const alpha = s.brightness * (0.6 + 0.4 * Math.sin(s.twinkle));
                ctx.fillStyle = w.starColor.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                if (w.starColor === '#ffffff' || w.starColor === '#cccccc') {
                    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                }
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // Asteroids
            asteroids.forEach(a => {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.rotation);
                ctx.fillStyle = '#555';
                ctx.strokeStyle = '#777';
                ctx.lineWidth = 1;
                ctx.beginPath();
                const s = a.size;
                ctx.moveTo(-s, -s*0.6);
                ctx.lineTo(-s*0.4, -s);
                ctx.lineTo(s*0.6, -s*0.5);
                ctx.lineTo(s, s*0.2);
                ctx.lineTo(s*0.3, s*0.8);
                ctx.lineTo(-s*0.7, s*0.7);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });

            // Player ship
            drawPlayerShip(player.x, player.y);

            // Bullets
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = b.enemy ? 3 : 6;
                if (b.enemy) { ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill(); }
                else ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                ctx.shadowBlur = 0;
            });

            // Enemies
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.strokeStyle = e.color;
                ctx.lineWidth = 1.5;
                ctx.shadowColor = e.color;
                ctx.shadowBlur = 6;

                if (e.type === 'scout') {
                    ctx.beginPath();
                    ctx.moveTo(e.x, e.y + e.h/2);
                    ctx.lineTo(e.x - e.w/2, e.y - e.h/3);
                    ctx.lineTo(e.x - e.w/4, e.y - e.h/2);
                    ctx.lineTo(e.x, e.y - e.h/3);
                    ctx.lineTo(e.x + e.w/4, e.y - e.h/2);
                    ctx.lineTo(e.x + e.w/2, e.y - e.h/3);
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                } else if (e.type === 'fighter') {
                    ctx.beginPath();
                    ctx.moveTo(e.x, e.y - e.h/2);
                    ctx.lineTo(e.x - e.w/2, e.y + e.h/3);
                    ctx.lineTo(e.x - e.w/3, e.y + e.h/2);
                    ctx.lineTo(e.x, e.y + e.h/4);
                    ctx.lineTo(e.x + e.w/3, e.y + e.h/2);
                    ctx.lineTo(e.x + e.w/2, e.y + e.h/3);
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                } else if (e.type === 'bomber') {
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                    ctx.strokeRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                } else if (e.type === 'boss') {
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                    ctx.strokeRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                    for (let tx = -e.w/3; tx <= e.w/3; tx += e.w/3) {
                        ctx.fillStyle = '#440000';
                        ctx.fillRect(e.x + tx - 8, e.y - e.h/3, 16, 14);
                        ctx.strokeStyle = '#ff2222';
                        ctx.strokeRect(e.x + tx - 8, e.y - e.h/3, 16, 14);
                    }
                }
                ctx.shadowBlur = 0;

                if (e.hp < e.maxHp) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 8, e.w, 4);
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 8, e.w * (e.hp/e.maxHp), 4);
                }
            });

            // Power-ups
            powerUps.forEach(p => {
                const cols = { health: '#00ff88', shield: '#00aaff', score: '#ffaa00' };
                const icons = { health: '+', shield: '◈', score: '★' };
                ctx.fillStyle = cols[p.type];
                ctx.shadowColor = cols[p.type];
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 9, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(icons[p.type], p.x, p.y + 4);
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('rgb', 'rgba');
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.restore();
        }

        function drawPlayerShip(x, y) {
            const glow = 0.5 + 0.5 * Math.sin(engineGlow);
            ctx.save();
            ctx.translate(x, y);

            if (shield > 0) {
                ctx.strokeStyle = `rgba(0,170,255,${0.3 * (shield/50)})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 32, 0, Math.PI*2);
                ctx.stroke();
            }

            const bodyGrad = ctx.createLinearGradient(0, -25, 0, 18);
            bodyGrad.addColorStop(0, '#667788');
            bodyGrad.addColorStop(0.4, '#334455');
            bodyGrad.addColorStop(0.8, '#1a2a35');
            bodyGrad.addColorStop(1, '#0a1520');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(-14, 6);
            ctx.lineTo(-16, 20);
            ctx.lineTo(-7, 16);
            ctx.lineTo(0, 24);
            ctx.lineTo(7, 16);
            ctx.lineTo(16, 20);
            ctx.lineTo(14, 6);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#889999';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            const cockGrad = ctx.createRadialGradient(0, -7, 1, 0, -7, 8);
            cockGrad.addColorStop(0, '#aaddff');
            cockGrad.addColorStop(0.5, '#3388cc');
            cockGrad.addColorStop(1, '#1a3355');
            ctx.fillStyle = cockGrad;
            ctx.beginPath();
            ctx.ellipse(0, -7, 7, 10, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#88aacc';
            ctx.stroke();

            ctx.fillStyle = '#2a3a45';
            ctx.beginPath();
            ctx.moveTo(-14, 1);
            ctx.lineTo(-24, 5);
            ctx.lineTo(-20, 12);
            ctx.lineTo(-12, 8);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#556670';
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(14, 1);
            ctx.lineTo(24, 5);
            ctx.lineTo(20, 12);
            ctx.lineTo(12, 8);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ff6600';
            ctx.shadowColor = 'rgba(255,136,0,0.8)';
            ctx.shadowBlur = 10 * glow;
            ctx.beginPath();
            ctx.moveTo(-5, 22);
            ctx.lineTo(0, 22 + 7 * glow);
            ctx.lineTo(5, 22);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffaa00';
            ctx.shadowColor = 'rgba(255,170,0,0.6)';
            ctx.shadowBlur = 5 * glow;
            ctx.fillRect(-4, 20, 8, 3);
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            if (gameState === 'playing') update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ==================== INIT ====================
        generateStars();
        initGame();
        gameLoop();
    </script>
</body>
</html>
