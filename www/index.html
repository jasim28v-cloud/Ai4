<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كتاب الطبخ العربي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --border: #f0ede8;
            --gold: #c9a84c;
            --gold-light: #f5ecd8;
            --gold-dark: #8b7300;
            --brown: #8B4513;
            --brown-light: #faf5f0;
            --olive: #556B2F;
            --olive-light: #f5f8f0;
            --text: #1a1a1a;
            --text2: #555;
            --text3: #999;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f2f0eb;
            color: var(--text);
            font-family: 'Cairo', 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            direction: rtl;
        }

        .app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
        }

        /* ==================== HEADER ==================== */
        .header {
            padding: 14px 18px;
            background: linear-gradient(135deg, #fff, #fdfaf5);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(201,168,76,0.3);
        }

        .header-title {
            font-size: 19px;
            font-weight: 800;
            color: #1a1a1a;
            letter-spacing: 0;
        }

        .header-sub {
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        .header-actions { display: flex; gap: 6px; }

        .header-btn {
            width: 38px;
            height: 38px;
            background: #f8f6f2;
            border: 1px solid var(--border);
            color: #888;
            cursor: pointer;
            border-radius: 12px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .header-btn.active {
            background: #fdf5f5;
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .fav-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background: #e74c3c;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
        }
        .fav-badge.show { display: flex; }

        /* ==================== STATS ==================== */
        .stats-bar {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            flex: 1;
            padding: 8px;
            background: #fdfaf5;
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
        }

        .stat-num {
            font-size: 14px;
            font-weight: 800;
            color: var(--gold-dark);
        }
        .stat-lbl {
            font-size: 7px;
            color: #999;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ==================== SEARCH ==================== */
        .search-section {
            padding: 0 16px 8px;
            background: var(--surface);
        }

        .search-wrapper { position: relative; }

        .search-input {
            width: 100%;
            padding: 11px 40px 11px 14px;
            background: #f8f6f2;
            border: 1.5px solid var(--border);
            color: var(--text);
            font-size: 12px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: all 0.3s;
            text-align: right;
        }

        .search-input:focus {
            border-color: var(--gold);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(201,168,76,0.06);
        }
        .search-input::placeholder { color: #ccc; }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #bbb;
            pointer-events: none;
        }

        /* ==================== CATEGORY FILTER ==================== */
        .cat-scroll {
            display: flex;
            gap: 6px;
            padding: 0 16px 10px;
            background: var(--surface);
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }

        .cat-scroll::-webkit-scrollbar { height: 0; }

        .cat-chip {
            padding: 8px 14px;
            background: #f8f6f2;
            border: 1.5px solid var(--border);
            color: #888;
            cursor: pointer;
            border-radius: 22px;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .cat-chip:hover { background: #f0ede8; }
        .cat-chip.active {
            background: #fff;
            border-color: var(--gold);
            color: var(--gold-dark);
            font-weight: 800;
            box-shadow: 0 2px 8px rgba(201,168,76,0.12);
        }

        /* ==================== CONTENT ==================== */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-content: start;
        }

        .content-area::-webkit-scrollbar { width: 4px; }
        .content-area::-webkit-scrollbar-thumb { background: #e0ddd8; border-radius: 4px; }

        /* ==================== RECIPE CARD ==================== */
        .recipe-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow);
            animation: cardIn 0.4s ease;
            position: relative;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .recipe-card:active { transform: scale(0.97); }

        .card-image {
            width: 100%;
            aspect-ratio: 1.3;
            background: linear-gradient(135deg, #f8f4ec, #f0e8d8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            position: relative;
        }

        .card-time {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.95);
            color: #666;
            font-size: 9px;
            font-weight: 700;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .card-fav {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.95);
            border: none;
            color: #ddd;
            cursor: pointer;
            border-radius: 50%;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .card-fav.liked { color: #e74c3c; }

        .card-body { padding: 12px 14px 14px; }

        .card-cat {
            display: inline-block;
            padding: 3px 8px;
            background: var(--gold-light);
            color: var(--gold-dark);
            font-size: 8px;
            font-weight: 700;
            border-radius: 6px;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-stars { color: #f0a500; font-size: 10px; }
        .card-diff {
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #fff;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 88vh;
            overflow-y: auto;
            animation: slideUp 0.4s ease;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal::-webkit-scrollbar { width: 3px; }
        .modal::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: #e0ddd8;
            border-radius: 2px;
            margin: 10px auto 0;
        }

        .modal-image {
            width: 100%;
            aspect-ratio: 1.5;
            background: linear-gradient(135deg, #f8f4ec, #f0e8d8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            position: relative;
            margin-top: 6px;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            background: rgba(255,255,255,0.95);
            border: none;
            color: #333;
            cursor: pointer;
            border-radius: 50%;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            box-shadow: var(--shadow);
        }

        .modal-body { padding: 20px 18px 30px; }

        .modal-cat {
            display: inline-block;
            padding: 4px 10px;
            background: var(--gold-light);
            color: var(--gold-dark);
            font-size: 9px;
            font-weight: 700;
            border-radius: 20px;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .modal-title {
            font-size: 21px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .modal-info {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 12px;
            background: #fdfaf5;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            color: #666;
            border: 1px solid var(--border);
        }

        .modal-section { margin-bottom: 20px; }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ingredient-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #444;
            padding: 9px 12px;
            background: #fafaf8;
            border-radius: 10px;
            border: 1px solid #f5f2ec;
        }

        .ingredient-dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .step-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

        .step-item {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #444;
            line-height: 1.6;
        }

        .step-num {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #fff;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .btn-fav {
            width: 100%;
            padding: 12px;
            background: #fafaf8;
            border: 1.5px solid #f0ede8;
            color: #666;
            cursor: pointer;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            margin-top: 4px;
        }

        .btn-fav.liked {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }

        /* ==================== EMPTY ==================== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #ccc;
        }

        .empty-icon { font-size: 45px; display: block; margin-bottom: 8px; }
        .empty-text { font-size: 12px; font-weight: 600; }

        /* ==================== TOAST ==================== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1a1a1a;
            color: #fff;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            z-index: 300;
            transition: transform 0.4s;
            font-family: 'Cairo', sans-serif;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-right">
                <div class="logo-icon">🍳</div>
                <div>
                    <div class="header-title">كتاب الطبخ</div>
                    <div class="header-sub">المطبخ العربي الأصيل</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="favFilterBtn" onclick="toggleFavFilter()">
                    ❤️
                    <span class="fav-badge" id="favBadge">0</span>
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-num" id="statTotal">20</div><div class="stat-lbl">وصفة</div></div>
            <div class="stat-card"><div class="stat-num">5</div><div class="stat-lbl">أقسام</div></div>
            <div class="stat-card"><div class="stat-num" id="statFavs">0</div><div class="stat-lbl">مفضلة</div></div>
            <div class="stat-card"><div class="stat-num">⭐</div><div class="stat-lbl">تقييم</div></div>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" class="search-input" placeholder="ابحث عن وصفة أو مكون..." id="searchInput" oninput="renderRecipes()">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <!-- Categories -->
        <div class="cat-scroll" id="catFilter">
            <button class="cat-chip active" data-cat="all" onclick="filterCat('all', this)">🍽️ الكل</button>
            <button class="cat-chip" data-cat="main" onclick="filterCat('main', this)">🍖 أطباق رئيسية</button>
            <button class="cat-chip" data-cat="rice" onclick="filterCat('rice', this)">🍚 أرز وكبسات</button>
            <button class="cat-chip" data-cat="appetizer" onclick="filterCat('appetizer', this)">🥗 مقبلات</button>
            <button class="cat-chip" data-cat="sweet" onclick="filterCat('sweet', this)">🍯 حلويات</button>
            <button class="cat-chip" data-cat="drink" onclick="filterCat('drink', this)">☕ مشروبات</button>
        </div>

        <!-- Content -->
        <div class="content-area" id="contentArea"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const recipes = [
            { id:1, title:'كبسة الدجاج السعودية', cat:'rice', time:'ساعة ونصف', diff:'متوسط', servings:6, stars:5, image:'🍗', ingredients:['دجاجة كاملة مقطعة','3 أكواب أرز بسمتي','2 بصل مفروم','4 طماطم مبشورة','بهارات الكبسة','زبيب ولوز للزينة','زيت نباتي'], steps:['اغسل الأرز وانقعه 30 دقيقة.','حمّر الدجاج في الزيت حتى يصبح ذهبياً.','أضف البصل وقلّب حتى يذبل.','أضف الطماطم والبهارات واطبخ 10 دقائق.','أضف 4 أكواب ماء واتركه يغلي.','أضف الأرز واتركه على نار هادئة 30 دقيقة.','زيّن بالزبيب واللوز المحمص.'] },
            { id:2, title:'مندي اللحم', cat:'rice', time:'3 ساعات', diff:'صعب', servings:8, stars:5, image:'🥩', ingredients:['2 كيلو لحم غنم','3 أكواب أرز بسمتي','بهارات المندي','فحم للتدخين','زعفران','مكسرات'], steps:['تبّل اللحم بالبهارات واتركه ساعتين.','اطبخ اللحم في قدر الضغط 45 دقيقة.','اسلق الأرز في مرق اللحم.','ضع الفحم المشتعل في ورق قصدير مع زيت.','غطّ القدر واتركه يتدخن 10 دقائق.','قدّم مع المكسرات والصلصة.'] },
            { id:3, title:'شاورما الدجاج', cat:'main', time:'40 دقيقة', diff:'سهل', servings:4, stars:5, image:'🌯', ingredients:['500g صدر دجاج','بهارات شاورما','ثومية (توم)','مخلل خيار','بطاطس مقلية','خبز صاج'], steps:['قطّع الدجاج شرائح رفيعة.','تبّل بالبهارات واتركه 30 دقيقة.','اقلي الدجاج على نار عالية.','ادهن الخبز بالثومية.','أضف الدجاج والبطاطس والمخلل.','لفّ الشاورما بإحكام وقدّمها.'] },
            { id:4, title:'المقلوبة الفلسطينية', cat:'rice', time:'ساعة', diff:'متوسط', servings:6, stars:5, image:'🍲', ingredients:['دجاجة كاملة','2 كوب أرز','باذنجان مقلي','قرنبيط مقلي','بطاطا مقلية','بهارات مشكلة'], steps:['اسلق الدجاج مع البهارات.','اقلي الخضار كل على حدة.','ضع طبقة خضار في القدر ثم الأرز.','اسكب المرق واطبخ 30 دقيقة.','اقلب القدر على صينية التقديم.','زيّن بالمكسرات المحمصة.'] },
            { id:5, title:'المنسف الأردني', cat:'main', time:'ساعتين', diff:'صعب', servings:8, stars:5, image:'🍖', ingredients:['2 كيلو لحم غنم','جميد (لبن مجفف)','3 أكواب أرز','خبز شراك','صنوبر ولوز','بهارات'], steps:['انقع الجميد في الماء ليلة كاملة.','اطبخ اللحم في قدر الضغط ساعة.','حضّر الأرز بالشعيرية.','سخّن الجميد واخفقه حتى يصبح ناعماً.','ضع الخبز في الطبق ثم الأرز.','اسكب اللحم والجميد وزين بالمكسرات.'] },

            { id:7, title:'متبل الباذنجان', cat:'appetizer', time:'25 دقيقة', diff:'سهل', servings:4, stars:5, image:'🍆', ingredients:['2 باذنجان كبير','3 ملاعق طحينة','عصير ليمونة','2 فص ثوم','زيت زيتون','بقدونس'], steps:['اشوِ الباذنجان على النار حتى يحترق القشر.','قشّر الباذنجان واهرسه جيداً.','أضف الطحينة والليمون والثوم.','اخلط جيداً حتى يصبح كريمياً.','زيّن بزيت الزيتون والبقدونس.'] },

            { id:12, title:'الشكشوكة المغربية', cat:'main', time:'20 دقيقة', diff:'سهل', servings:2, stars:4, image:'🍳', ingredients:['4 بيضات','4 طماطم','بصل','فلفل أخضر','كمون','بابريكا'], steps:['اقلي البصل والفلفل في الزيت.','أضف الطماطم والبهارات.','اطبخ حتى تصبح صلصة سميكة.','اكسر البيض فوق الصلصة.','غطّ حتى ينضج البيض.','قدّم مع الخبز الطازج.'] },

            { id:14, title:'الفتوش اللبناني', cat:'appetizer', time:'15 دقيقة', diff:'سهل', servings:4, stars:5, image:'🥗', ingredients:['خبز عربي محمص','خس','طماطم','خيار','بصل','زيت زيتون','دبس رمان','سماق'], steps:['قطّع الخضار إلى قطع متوسطة.','اقطع الخبز المحمص.','اخلط زيت الزيتون مع دبس الرمان.','ضع الخضار في طبق التقديم.','أضف الخبز والصوص.','رش السماق على الوجه.'] },

            { id:16, title:'القهوة العربية', cat:'drink', time:'20 دقيقة', diff:'سهل', servings:6, stars:5, image:'🫖', ingredients:['3 ملاعق بن عربي مطحون','هيل مطحون','زعفران','ماء','تمر للتقديم'], steps:['اغلِ الماء في دلة القهوة.','أضف البن واتركه يغلي 10 دقائق.','أضف الهيل والزعفران.','اتركه يهدأ ويرسب البن.','اسكب في فناجين صغيرة.','قدّم مع التمر الفاخر.'] },

            { id:19, title:'المهلبية', cat:'sweet', time:'15 دقيقة', diff:'سهل', servings:4, stars:4, image:'🍮', ingredients:['4 أكواب حليب','نصف كوب نشا','سكر','ماء ورد','فستق للزينة'], steps:['اخلط النشا مع قليل من الحليب البارد.','سخّن باقي الحليب مع السكر.','أضف النشا وحرّك باستمرار.','اطبخ حتى يصبح سميكاً.','أضف ماء الورد واسكب في أطباق.','برّد وزين بالفستق.'] },
            { id:20, title:'الكبسة الحجازية', cat:'rice', time:'ساعة', diff:'متوسط', servings:6, stars:5, image:'🍛', ingredients:['دجاجة كاملة','3 أكواب أرز','طماطم','جزر','بهارات كبسة','لوز وزبيب'], steps:['حمّر الدجاج في الزيت.','أضف الخضار والبهارات.','اطبخ مع الماء 40 دقيقة.','أضف الأرز واطبخ 25 دقيقة.','زيّن بالمكسرات المحمصة.','قدّم مع الصلصة الحارة.'] }
        ];

        let favorites = JSON.parse(localStorage.getItem('arabic_recipe_favs') || '[]');
        let currentCat = 'all';
        let showFavsOnly = false;

        function renderRecipes() {
            const area = document.getElementById('contentArea');
            const search = document.getElementById('searchInput').value.trim();
            
            let filtered = recipes;
            if (currentCat !== 'all') filtered = filtered.filter(r => r.cat === currentCat);
            if (showFavsOnly) filtered = filtered.filter(r => favorites.includes(r.id));
            if (search) {
                filtered = filtered.filter(r => 
                    r.title.includes(search) || 
                    r.ingredients.some(i => i.includes(search))
                );
            }

            updateStats();

            if (filtered.length === 0) {
                area.innerHTML = `<div class="empty-state"><span class="empty-icon">🍽️</span><span class="empty-text">لا توجد وصفات</span></div>`;
                return;
            }

            area.innerHTML = filtered.map(r => {
                const isFav = favorites.includes(r.id);
                const stars = '⭐'.repeat(r.stars);
                return `
                    <div class="recipe-card" onclick="openRecipe(${r.id})">
                        <div class="card-image">
                            <span style="font-size:40px">${r.image}</span>
                            <span class="card-time">⏱ ${r.time}</span>
                            <button class="card-fav ${isFav ? 'liked' : ''}" 
                                onclick="event.stopPropagation();toggleFav(${r.id})">
                                ${isFav ? '❤️' : '🤍'}
                            </button>
                        </div>
                        <div class="card-body">
                            <span class="card-cat">${getCatName(r.cat)}</span>
                            <div class="card-title">${r.title}</div>
                            <div class="card-footer">
                                <span class="card-stars">${stars}</span>
                                <span class="card-diff">${r.diff}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getCatName(cat) {
            const names = { main:'رئيسي', rice:'أرز', appetizer:'مقبلات', sweet:'حلويات', drink:'مشروبات' };
            return names[cat] || cat;
        }

        function updateStats() {
            document.getElementById('statFavs').textContent = favorites.length;
            document.getElementById('favBadge').textContent = favorites.length;
            document.getElementById('favBadge').classList.toggle('show', favorites.length > 0);
        }

        function filterCat(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderRecipes();
        }

        function toggleFavFilter() {
            showFavsOnly = !showFavsOnly;
            document.getElementById('favFilterBtn').classList.toggle('active', showFavsOnly);
            renderRecipes();
            showToast(showFavsOnly ? '❤️ عرض المفضلة' : '🍽️ عرض الكل');
        }

        function toggleFav(id) {
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('arabic_recipe_favs', JSON.stringify(favorites));
            updateStats();
            renderRecipes();
        }

        function openRecipe(id) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            const isFav = favorites.includes(r.id);

            document.getElementById('modal').innerHTML = `
                <div class="modal-handle"></div>
                <div class="modal-image">
                    <span style="font-size:60px">${r.image}</span>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body">
                    <span class="modal-cat">${getCatName(r.cat)}</span>
                    <div class="modal-title">${r.title}</div>
                    <div class="modal-info">
                        <div class="info-pill">⏱ ${r.time}</div>
                        <div class="info-pill">📊 ${r.diff}</div>
                        <div class="info-pill">🍽️ ${r.servings} أشخاص</div>
                        <div class="info-pill">⭐ ${r.stars}/5</div>
                    </div>
                    <div class="modal-section">
                        <div class="section-title">🛒 المقادير</div>
                        <ul class="ingredient-list">
                            ${r.ingredients.map(i => `<li class="ingredient-item"><span class="ingredient-dot"></span>${i}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="modal-section">
                        <div class="section-title">👨‍🍳 طريقة التحضير</div>
                        <ul class="step-list">
                            ${r.steps.map((s, idx) => `<li class="step-item"><span class="step-num">${idx+1}</span><span>${s}</span></li>`).join('')}
                        </ul>
                    </div>
                    <button class="btn-fav ${isFav ? 'liked' : ''}" onclick="toggleFav(${r.id});closeModal();showToast('${isFav ? '💔 تمت الإزالة' : '❤️ تمت الإضافة'}')">
                        ${isFav ? '❤️ إزالة من المفضلة' : '🤍 أضف إلى المفضلة'}
                    </button>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        updateStats();
        renderRecipes();
    </script>
</body>
</html>
