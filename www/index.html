<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify X</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --surface: #1a1a1a;
            --surface2: #222222;
            --border: #282828;
            --green: #1DB954;
            --green-light: #1ed760;
            --text: #ffffff;
            --text2: #b3b3b3;
            --text3: #727272;
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
            direction: rtl;
        }

        .app {
            width: 100%; max-width: 440px; height: 100vh; max-height: 860px;
            display: flex; flex-direction: column;
            background: var(--bg); overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* ==================== TOP BAR ==================== */
        .topbar {
            padding: 16px 16px 8px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-time { font-size: 11px; color: var(--text2); }
        .topbar-icons { display: flex; gap: 12px; }
        .topbar-icons span { font-size: 14px; }

        /* ==================== NAV TABS ==================== */
        .nav-tabs {
            display: flex; gap: 4px; padding: 0 16px 12px;
        }
        .nav-tab {
            padding: 8px 18px; border-radius: 20px;
            font-size: 11px; font-weight: 700; cursor: pointer;
            color: var(--text2); background: var(--surface2);
            border: none; font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .nav-tab.active { background: var(--green); color: #000; }

        /* ==================== CONTENT AREA ==================== */
        .content-area {
            flex: 1; overflow-y: auto; padding: 0 16px;
        }
        .content-area::-webkit-scrollbar { width: 3px; }
        .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 14px; font-weight: 800; margin-bottom: 10px;
            color: var(--text);
        }

        /* Recently Played */
        .recent-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .recent-card {
            background: var(--surface); border-radius: var(--radius);
            overflow: hidden; cursor: pointer; transition: all 0.3s;
        }
        .recent-card:active { transform: scale(0.96); }
        .recent-img {
            width: 100%; aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
        }
        .recent-info { padding: 8px 10px 10px; }
        .recent-name { font-size: 10px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Popular Songs */
        .song-list { display: flex; flex-direction: column; gap: 4px; }
        .song-row {
            display: flex; align-items: center; gap: 12px; padding: 8px;
            border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
        }
        .song-row:hover { background: var(--surface); }
        .song-row.active { background: var(--surface); }
        .song-img {
            width: 48px; height: 48px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .song-info { flex: 1; min-width: 0; }
        .song-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-name.playing { color: var(--green); }
        .song-artist { font-size: 10px; color: var(--text2); }
        .song-dots { color: var(--text2); font-size: 18px; cursor: pointer; }

        /* ==================== NOW PLAYING BAR ==================== */
        .now-playing-bar {
            background: #000; border-top: 1px solid var(--border);
            padding: 8px 12px;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer;
        }
        .np-img {
            width: 44px; height: 44px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .np-info { flex: 1; min-width: 0; }
        .np-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .np-name.playing { color: var(--green); }
        .np-artist { font-size: 9px; color: var(--text2); }
        .np-actions { display: flex; gap: 12px; }
        .np-btn {
            background: none; border: none; color: var(--text);
            font-size: 18px; cursor: pointer;
        }
        .np-btn.play-btn { font-size: 24px; color: var(--green); }

        /* ==================== FULL PLAYER MODAL ==================== */
        .player-overlay {
            display: none; position: fixed; inset: 0;
            background: var(--bg); z-index: 100;
            flex-direction: column;
        }
        .player-overlay.show { display: flex; }

        .player-top {
            padding: 16px; display: flex; align-items: center; justify-content: space-between;
        }
        .player-close {
            background: none; border: none; color: var(--text);
            font-size: 24px; cursor: pointer;
        }

        .player-artwork {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .player-art {
            width: 260px; height: 260px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: discSpin 4s linear infinite paused;
        }
        .player-art.playing { animation-play-state: running; }
        @keyframes discSpin { to { transform: rotate(360deg); } }

        .player-info { padding: 20px 24px; }
        .player-name { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
        .player-artist { font-size: 13px; color: var(--text2); }

        .player-progress { padding: 0 24px; }
        .progress-bar {
            width: 100%; height: 4px; background: var(--surface2);
            border-radius: 2px; cursor: pointer;
        }
        .progress-fill {
            height: 100%; background: var(--green);
            border-radius: 2px; width: 0%; transition: width 0.1s linear;
        }
        .progress-time {
            display: flex; justify-content: space-between;
            font-size: 10px; color: var(--text2); margin-top: 6px;
        }

        .player-controls {
            display: flex; align-items: center; justify-content: center;
            gap: 24px; padding: 16px 24px 24px;
        }
        .player-ctrl {
            background: none; border: none; color: var(--text);
            font-size: 20px; cursor: pointer; transition: all 0.2s;
        }
        .player-ctrl:active { transform: scale(0.9); }
        .player-ctrl.active { color: var(--green); }
        .player-ctrl.play-main {
            width: 64px; height: 64px; background: var(--green);
            border-radius: 50%; font-size: 24px; color: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .player-ctrl.play-main:active { transform: scale(0.9); }

        .player-extra { display: flex; justify-content: space-between; padding: 0 24px 16px; }
        .player-extra span { font-size: 16px; }

        /* ==================== UPLOAD ==================== */
        .upload-section {
            padding: 16px; text-align: center;
        }
        .upload-btn {
            padding: 14px 28px; background: var(--green);
            color: #000; border: none; cursor: pointer;
            border-radius: 25px; font-size: 13px; font-weight: 800;
            font-family: 'Cairo', sans-serif;
        }
        input[type="file"] { display: none; }

        .empty-state { text-align: center; padding: 30px; color: var(--text3); }
        .empty-state .icon { font-size: 40px; display: block; margin-bottom: 8px; }

        .toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #333; color: #fff; padding: 10px 20px;
            border-radius: 20px; font-size: 10px; font-weight: 600;
            z-index: 300; transition: transform 0.4s; font-family: 'Cairo', sans-serif;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <span class="topbar-time" id="currentTime2">10:30</span>
            <div class="topbar-icons">
                <span>📶</span><span>📡</span><span>🔋</span>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('home', this)">🏠 الرئيسية</button>
            <button class="nav-tab" onclick="switchTab('library', this)">📚 المكتبة</button>
            <button class="nav-tab" onclick="switchTab('upload', this)">📂 رفع</button>
        </div>

        <div class="content-area" id="contentArea">
            <!-- Home Tab -->
            <div id="homeTab">
                <div class="section">
                    <div class="section-title">🎧 Recently Played</div>
                    <div class="recent-grid" id="recentGrid"></div>
                </div>
                <div class="section">
                    <div class="section-title">🔥 Popular</div>
                    <div class="song-list" id="popularList"></div>
                </div>
            </div>

            <!-- Library Tab -->
            <div id="libraryTab" style="display:none;">
                <div class="section">
                    <div class="section-title">❤️ Favorites</div>
                    <div class="song-list" id="favoritesList"></div>
                </div>
                <div class="section">
                    <div class="section-title">📋 All Songs</div>
                    <div class="song-list" id="allSongsList"></div>
                </div>
            </div>

            <!-- Upload Tab -->
            <div id="uploadTab" style="display:none;">
                <div class="upload-section">
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📂 Upload Music</button>
                    <input type="file" id="fileInput" accept="audio/*" multiple onchange="addFiles()">
                    <p style="color:var(--text3);font-size:10px;margin-top:12px;">MP3, WAV, OGG, FLAC</p>
                </div>
            </div>
        </div>

        <!-- Now Playing Bar -->
        <div class="now-playing-bar" id="nowPlayingBar" onclick="openPlayer()" style="display:none;">
            <div class="np-img" id="npImg">🎵</div>
            <div class="np-info">
                <div class="np-name" id="npName">No song</div>
                <div class="np-artist" id="npArtist"></div>
            </div>
            <div class="np-actions">
                <button class="np-btn play-btn" id="miniPlayBtn" onclick="event.stopPropagation();togglePlay()">▶</button>
                <button class="np-btn" onclick="event.stopPropagation();nextSong()">⏭</button>
            </div>
        </div>
    </div>

    <!-- Full Player -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-top">
            <button class="player-close" onclick="closePlayer()">▼</button>
            <span style="font-size:10px;color:var(--text2)">NOW PLAYING</span>
            <span style="font-size:16px">⋮</span>
        </div>

        <div class="player-artwork">
            <div class="player-art" id="playerArt">🎵</div>
        </div>

        <div class="player-info">
            <div class="player-name" id="playerName">No song</div>
            <div class="player-artist" id="playerArtist"></div>
        </div>

        <div class="player-progress">
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-time">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="player-ctrl" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
            <button class="player-ctrl" onclick="prevSong()">⏮</button>
            <button class="player-ctrl play-main" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="player-ctrl" onclick="nextSong()">⏭</button>
            <button class="player-ctrl" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
        </div>

        <div class="player-extra">
            <span id="likeBtn" onclick="toggleLike()">🤍</span>
            <span>📤</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== STATE ====================
        let playlist = [], favorites = JSON.parse(localStorage.getItem('spotifyx_favs')||'[]');
        let currentIndex = -1, audio = new Audio();
        let isPlaying = false, isShuffle = false, isRepeat = false;

        // ==================== AUDIO EVENTS ====================
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            document.getElementById('totalTime').textContent = formatTime(audio.duration);
        });
        audio.addEventListener('ended', () => { isRepeat ? audio.play() : nextSong(); });
        audio.addEventListener('play', onPlay);
        audio.addEventListener('pause', onPause);

        function updateProgress() {
            if (audio.duration) {
                document.getElementById('progressFill').style.width = (audio.currentTime/audio.duration*100)+'%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            }
        }

        function onPlay() {
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸';
            document.getElementById('miniPlayBtn').textContent = '⏸';
            document.getElementById('playerArt').classList.add('playing');
            updateNowPlayingBar();
            renderAll();
        }

        function onPause() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶';
            document.getElementById('miniPlayBtn').textContent = '▶';
            document.getElementById('playerArt').classList.remove('playing');
            updateNowPlayingBar();
        }

        function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

        // ==================== PLAYBACK ====================
        function loadSong(index) {
            if (index<0 || index>=playlist.length) return;
            currentIndex = index;
            const s = playlist[index];
            audio.src = s.data;
            audio.play();
            updatePlayerUI(s);
            updateNowPlayingBar();
            renderAll();
        }

        function updatePlayerUI(s) {
            document.getElementById('playerName').textContent = s.name;
            document.getElementById('playerArtist').textContent = s.size;
            document.getElementById('playerArt').textContent = '🎵';
            document.getElementById('playerArt').style.background = 'linear-gradient(135deg, #1DB954, #191414)';
        }

        function updateNowPlayingBar() {
            if (currentIndex >= 0 && currentIndex < playlist.length) {
                const s = playlist[currentIndex];
                document.getElementById('nowPlayingBar').style.display = 'flex';
                document.getElementById('npName').textContent = s.name;
                document.getElementById('npName').classList.toggle('playing', isPlaying);
                document.getElementById('npArtist').textContent = s.size;
                document.getElementById('npImg').textContent = '🎵';
            } else {
                document.getElementById('nowPlayingBar').style.display = 'none';
            }
        }

        function togglePlay() { 
            if (!audio.src && playlist.length>0) { loadSong(0); return; }
            isPlaying ? audio.pause() : audio.play(); 
        }
        function nextSong() { if(!playlist.length)return; let n=isShuffle?Math.floor(Math.random()*playlist.length):currentIndex+1; if(n>=playlist.length)n=0; loadSong(n); }
        function prevSong() { if(!playlist.length)return; let p=currentIndex-1; if(p<0)p=playlist.length-1; loadSong(p); }
        function toggleShuffle() { isShuffle=!isShuffle; document.getElementById('shuffleBtn').classList.toggle('active',isShuffle); }
        function toggleRepeat() { isRepeat=!isRepeat; document.getElementById('repeatBtn').classList.toggle('active',isRepeat); }
        function seek(e) { if(!audio.duration)return; const r=document.getElementById('progressBar').getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; }

        // ==================== FAVORITES ====================
        function toggleLike() {
            if (currentIndex<0) return;
            const id = playlist[currentIndex].id;
            favorites = favorites.includes(id) ? favorites.filter(f=>f!==id) : [...favorites, id];
            localStorage.setItem('spotifyx_favs', JSON.stringify(favorites));
            updateLikeButton();
            renderAll();
        }
        function updateLikeButton() {
            if (currentIndex<0) return;
            document.getElementById('likeBtn').textContent = favorites.includes(playlist[currentIndex].id) ? '❤️' : '🤍';
        }

        // ==================== FILES ====================
        function addFiles() {
            const files = document.getElementById('fileInput').files;
            if (!files.length) return;
            Array.from(files).forEach(f => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    playlist.push({
                        name: f.name.replace(/\.[^/.]+$/, ""),
                        size: formatSize(f.size),
                        data: e.target.result,
                        id: Date.now() + Math.random()
                    });
                    renderAll();
                    if (playlist.length === 1) loadSong(0);
                };
                reader.readAsDataURL(f);
            });
            document.getElementById('fileInput').value = '';
            showToast('✅ ' + files.length + ' songs added');
        }

        function formatSize(b) { return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'; }

        // ==================== RENDER ====================
        function renderAll() {
            // Recent Grid
            const recent = playlist.slice(-6).reverse();
            document.getElementById('recentGrid').innerHTML = recent.map(s => `
                <div class="recent-card" onclick="loadSong(${playlist.indexOf(s)})">
                    <div class="recent-img" style="background:linear-gradient(135deg,#1DB954,#191414)">🎵</div>
                    <div class="recent-info"><div class="recent-name">${s.name}</div></div>
                </div>
            `).join('') || '<div class="empty-state"><span class="icon">🎵</span></div>';

            // Popular List
            document.getElementById('popularList').innerHTML = playlist.map((s,i) => `
                <div class="song-row ${i===currentIndex?'active':''}" onclick="loadSong(${i})">
                    <div class="song-img" style="background:linear-gradient(135deg,#1DB954,#191414)">🎵</div>
                    <div class="song-info">
                        <div class="song-name ${i===currentIndex&&isPlaying?'playing':''}">${s.name}</div>
                        <div class="song-artist">${s.size}</div>
                    </div>
                    <span class="song-dots">⋮</span>
                </div>
            `).join('') || '<div class="empty-state"><span class="icon">🎵</span><span>No songs</span></div>';

            // Favorites
            const favSongs = playlist.filter(s => favorites.includes(s.id));
            document.getElementById('favoritesList').innerHTML = favSongs.map(s => {
                const i = playlist.indexOf(s);
                return `
                <div class="song-row ${i===currentIndex?'active':''}" onclick="loadSong(${i})">
                    <div class="song-img" style="background:linear-gradient(135deg,#1DB954,#191414)">❤️</div>
                    <div class="song-info">
                        <div class="song-name ${i===currentIndex&&isPlaying?'playing':''}">${s.name}</div>
                        <div class="song-artist">${s.size}</div>
                    </div>
                </div>`;
            }).join('') || '<div class="empty-state"><span class="icon">❤️</span><span>No favorites</span></div>';

            // All Songs
            document.getElementById('allSongsList').innerHTML = playlist.map((s,i) => `
                <div class="song-row ${i===currentIndex?'active':''}" onclick="loadSong(${i})">
                    <div class="song-img" style="background:linear-gradient(135deg,#1DB954,#191414)">🎵</div>
                    <div class="song-info">
                        <div class="song-name ${i===currentIndex&&isPlaying?'playing':''}">${s.name}</div>
                        <div class="song-artist">${s.size}</div>
                    </div>
                </div>
            `).join('') || '<div class="empty-state"><span class="icon">🎵</span><span>No songs</span></div>';

            updateLikeButton();
        }

        // ==================== TABS ====================
        function switchTab(tab, btn) {
            document.getElementById('homeTab').style.display = tab==='home'?'block':'none';
            document.getElementById('libraryTab').style.display = tab==='library'?'block':'none';
            document.getElementById('uploadTab').style.display = tab==='upload'?'block':'none';
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // ==================== PLAYER MODAL ====================
        function openPlayer() { document.getElementById('playerOverlay').classList.add('show'); }
        function closePlayer() { document.getElementById('playerOverlay').classList.remove('show'); }

        function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

        // ==================== CLOCK ====================
        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime2').textContent = now.toLocaleTimeString('ar-SA', {hour:'2-digit',minute:'2-digit'});
        }, 1000);

        // ==================== INIT ====================
        renderAll();
    </script>
</body>
</html>
