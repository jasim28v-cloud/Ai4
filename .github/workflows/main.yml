name: 🎵 Music Player 2044 - CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  generate-and-build:
    name: 🏗️ Generate & Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 🎵 Run Scraper - Generate All App Files
        run: |
          echo "🚀 Running Music Player 2044 Generator..."
          python scraper.py
          echo ""
          echo "📁 Generated Files:"
          find . -type f -not -path './.git/*' | sort
      
      - name: 📋 Verify Project Structure
        run: |
          echo "🔍 Checking project structure..."
          echo ""
          echo "📂 Root files:"
          ls -la *.gradle *.properties 2>/dev/null || echo "  (root files)"
          echo ""
          echo "📂 App module:"
          ls -la app/
          echo ""
          echo "📂 Assets:"
          ls -la app/src/main/assets/www/
          echo ""
          echo "📂 Java:"
          find app/src/main/java -name "*.java"
          echo ""
          echo "📂 Resources:"
          find app/src/main/res -type f
      
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
      
      - name: 🏗️ Build Debug APK
        run: |
          echo "🔨 Building Debug APK..."
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: 🏗️ Build Release APK
        run: |
          echo "🔨 Building Release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: 📱 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer2044-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: 📱 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer2044-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
      
      - name: 📊 Upload Build Info
        uses: actions/upload-artifact@v4
        with:
          name: Build-Info
          path: app-info.json
          retention-days: 30
      
      - name: 🎉 Build Complete
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║                                          ║"
          echo "║   ✅ Build Successful!                   ║"
          echo "║   🎵 Music Player 2044                  ║"
          echo "║   📱 APK Ready for Download!            ║"
          echo "║   📦 Check Artifacts section            ║"
          echo "║                                          ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
